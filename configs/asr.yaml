experiment:
  name: mms_asr_chukchi_baseline
  task: asr

data:
  audio_manifest: data/interim/asr_manifest.csv
  segment_manifest: data/interim/asr_segments.csv
  transcription_state: data/interim/asr_transcriptions.jsonl
  raw_audio_root: audio
  segments_root: data/interim/asr_segments
  sample_rate: 16000

model:
  base_model: facebook/mms-1b-all
  language_code: ckt

preprocessing:
  vad_method: silero
  vad_threshold: 0.5
  min_speech_ms: 500
  min_silence_ms: 400
  min_segment_sec: 2.5
  max_segment_sec: 15.0
  silence_noise_db: -35
  min_silence_sec: 0.6
  boundary_padding_sec: 0.15
  overwrite: false

transcription:
  batch_size: 4
  min_confidence: 0.0
  device: auto

training:
  enabled: false
  output_dir: models/checkpoints/asr
